<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Recipe Book</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold text-primary">My Recipe Book</h1>
            <p class="lead">Save your favorite dishes with images and steps!</p>
        </header>

        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm p-4">
                    <h3 class="h5 mb-3">Add New Recipe</h3>
                    <form id="recipe-form">
                        <div class="mb-3">
                            <label class="form-label">Recipe Name</label>
                            <input type="text" id="name" class="form-control" placeholder="e.g. Pizza" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ingredients (comma separated)</label>
                            <textarea id="ingredients" class="form-control" placeholder="Tomato, Cheese, Flour"
                                required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Steps (comma separated)</label>
                            <textarea id="steps" class="form-control" placeholder="Mix, Bake, Eat" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select id="category" class="form-select">
                                <option value="Main Dish">Main Dish</option>
                                <option value="Dessert">Dessert</option>
                                <option value="Breakfast">Breakfast</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Image URL</label>
                            <input type="url" id="image-url" class="form-control" placeholder="https://..." required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Add Recipe</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="mb-4">
                    <input type="text" id="search-input" class="form-control form-control-lg shadow-sm"
                        placeholder="Search by name or category...">
                </div>

                <div id="recipe-list" class="row row-cols-1 row-cols-md-2 g-4">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="scripts.js"></script>
</body>

</html>
