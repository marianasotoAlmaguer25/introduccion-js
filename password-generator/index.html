<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <h1 class="title">Password Generator</h1>

        <div class="display-container">
            <input type="text" id="password-display" readonly placeholder="P4$5W0rD!">
            <button id="copy-btn" title="Copy to clipboard">
                <span id="copy-msg">COPIED</span> 📋
            </button>
        </div>

        <div class="settings-container">
            <div class="range-header">
                <span>Character Length</span>
                <span id="length-num">10</span>
            </div>
            <input type="range" id="length-slider" min="1" max="20" value="10">

            <div class="options">
                <label><input type="checkbox" id="upper"> Include Uppercase Letters</label>
                <label><input type="checkbox" id="lower" checked> Include Lowercase Letters</label>
                <label><input type="checkbox" id="numbers"> Include Numbers</label>
                <label><input type="checkbox" id="symbols"> Include Symbols</label>
            </div>

            <div class="strength-meter">
                <span>STRENGTH</span>
                <div class="strength-indicator">
                    <span id="strength-text">MEDIUM</span>
                    <div class="bars" id="bars-container">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                </div>
            </div>

            <button id="generate-btn">GENERATE ➔</button>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
